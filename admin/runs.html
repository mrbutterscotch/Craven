<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Runs | Craven Admin</title>
    <link rel="stylesheet" href="admin.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to report</a>
    <div class="admin-shell">
      <aside class="sidebar" aria-label="Admin navigation">
        <a class="admin-brand" href="online.html" aria-label="Craven Admin">
          <span class="brand-glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 3.2 19 6v5.2c0 4.1-2.6 7.8-7 9.6-4.4-1.8-7-5.5-7-9.6V6l7-2.8Z"></path>
              <path d="M12 7v6"></path>
              <path d="M9.7 9.2 12 7l2.3 2.2"></path>
            </svg>
          </span>
          <span>Craven Admin</span>
        </a>
        <nav class="side-nav" aria-label="Admin sections">
          <a href="online.html">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M16 11a4 4 0 1 0-8 0"></path>
              <path d="M4 20c.7-3.1 3.2-5 8-5s7.3 1.9 8 5"></path>
            </svg>
            <span>Online Players</span>
          </a>
          <a href="ghosts.html">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M6 20V9a6 6 0 0 1 12 0v11"></path>
              <path d="M9 12h.01"></path>
              <path d="M15 12h.01"></path>
            </svg>
            <span>Ghosts</span>
          </a>
          <a class="active" href="runs.html">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 19h16"></path>
              <path d="M5 17V5"></path>
              <path d="m8 14 3-4 3 2 4-6"></path>
            </svg>
            <span>Runs</span>
          </a>
          <a href="settings.html">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path>
              <path d="m4.9 10.2-1.1-2 2.4-2.4 2 1.1"></path>
              <path d="m15.8 6.9 2-1.1 2.4 2.4-1.1 2"></path>
              <path d="m19.1 13.8 1.1 2-2.4 2.4-2-1.1"></path>
              <path d="m8.2 17.1-2 1.1-2.4-2.4 1.1-2"></path>
            </svg>
            <span>Settings</span>
          </a>
        </nav>
        <div class="sidebar-status" aria-live="polite">
          <div>
            <span class="status-dot online"></span>
            <span>Server</span>
            <strong id="serverStatus">Checking</strong>
          </div>
          <div>
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 7v5l3 2"></path>
              <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path>
            </svg>
            <span id="clockTime">--:--</span>
            <small id="clockDate">--</small>
          </div>
        </div>
      </aside>

      <main id="main" class="dashboard">
        <header class="topbar">
          <div>
            <h1>Runs</h1>
            <p id="lastUpdated">Waiting for first refresh</p>
          </div>
          <div class="topbar-actions">
            <button class="icon-button primary-action" id="refreshButton" type="button">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M20 7v5h-5"></path>
                <path d="M4 17v-5h5"></path>
                <path d="M6 9.5A7 7 0 0 1 18.3 7"></path>
                <path d="M18 14.5A7 7 0 0 1 5.7 17"></path>
              </svg>
              Refresh
            </button>
          </div>
        </header>

        <section class="control-panel run-controls" aria-label="Run filters">
          <label>
            <span>Outcome</span>
            <select id="outcomeFilter">
              <option value="">All</option>
              <option value="win">Win</option>
              <option value="loss">Loss</option>
              <option value="forfeit">Forfeit</option>
            </select>
          </label>
          <label>
            <span>Min ghost wins</span>
            <select id="minGhostWins">
              <option value="0">Any</option>
              <option value="5">5+</option>
              <option value="10">10</option>
            </select>
          </label>
          <label>
            <span>Hero</span>
            <input id="heroFilter" type="text" placeholder="Any">
          </label>
          <label>
            <span>Version</span>
            <input id="versionFilter" type="text" placeholder="Any">
          </label>
          <label>
            <span>Limit</span>
            <select id="limit">
              <option value="50">50</option>
              <option value="100" selected>100</option>
              <option value="250">250</option>
            </select>
          </label>
        </section>

        <section class="stat-grid report-stat-grid" aria-label="Run summary">
          <article class="stat-card">
            <div>
              <span><i class="status-dot playing"></i>Returned</span>
              <strong id="runCount">0</strong>
            </div>
          </article>
          <article class="stat-card amber">
            <div>
              <span><i class="status-dot stale"></i>Wins</span>
              <strong id="winCount">0</strong>
            </div>
          </article>
        </section>

        <section class="table-panel" aria-labelledby="tableTitle">
          <div class="table-header">
            <h2 id="tableTitle"><span id="visibleCount">0</span> runs</h2>
            <button id="exportCsv" type="button">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 3v12"></path>
                <path d="m7 10 5 5 5-5"></path>
                <path d="M5 21h14"></path>
              </svg>
              Export CSV
            </button>
          </div>
          <div class="notice hidden" id="errorNotice" role="alert"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th scope="col">Player</th>
                  <th scope="col">Outcome</th>
                  <th scope="col">Hero</th>
                  <th scope="col">Day</th>
                  <th scope="col">Ghost Wins</th>
                  <th scope="col">Run Life</th>
                  <th scope="col">Version</th>
                  <th scope="col">Final Board</th>
                  <th scope="col">Ended</th>
                </tr>
              </thead>
              <tbody id="runRows"></tbody>
            </table>
            <div class="empty-state" id="emptyState">
              <strong>No runs found</strong>
              <span>Try widening the filters.</span>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="runs.js" defer></script>
  </body>
</html>
